name: CI

on:
  push:
    branches:
      - main
      - load-test/**
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: |
          echo "Running test suite..."
          npm test
      - name: Build
        run: npm run build
